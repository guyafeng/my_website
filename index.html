    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #252525;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #00d4aa;
            --accent-hover: #00f5c4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 60px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0, 212, 170, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 50%, rgba(0, 150, 255, 0.1) 0%, transparent 50%);
        }

        header h1 { font-size: 48px; font-weight: 700; margin-bottom: 10px; position: relative; }
        header h1 span { color: var(--accent); }
        header p { color: var(--text-secondary); font-size: 18px; }

        section { max-width: 1400px; margin: 0 auto; padding: 60px 20px; }

        .section-title {
            font-size: 32px; font-weight: 600; margin-bottom: 40px;
            display: flex; align-items: center; gap: 15px;
        }

        .section-title::before {
            content: ''; width: 4px; height: 32px;
            background: var(--accent); border-radius: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
        .card img, .card video { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
        .card-body { padding: 20px; }
        .card-title { font-size: 16px; font-weight: 500; }

        /* 修改为每行4列 */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .image-grid img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .image-grid img:hover {
            transform: scale(1.02);
        }

        footer { background: var(--bg-secondary); padding: 40px 20px; text-align: center; color: var(--text-secondary); margin-top: 60px; }
        footer a { color: var(--accent); text-decoration: none; }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .image-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            header h1 { font-size: 32px; }
            .section-title { font-size: 24px; }
            .grid, .image-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .grid, .image-grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        section { animation: fadeInUp 0.6s ease-out; }

        .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--bg-card), transparent); margin: 40px 0; }
        
        /* 添加加载失败时的样式 */
        img {
            background-color: var(--bg-secondary);
            min-height: 200px;
        }
    </style>
